name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Запуск вручную из GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tampermonkey-samsung-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: tampermonkey-samsung-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          body: |
            ## Tampermonkey Samsung v1.0.${{ github.run_number }}
            
            ### Что умеет:
            - ✅ Устанавливать .user.js скрипты по URL
            - ✅ Редактировать скрипты прямо в приложении
            - ✅ Включать/выключать скрипты
            - ✅ Автообновление скриптов
            - ✅ Внедрение скриптов в Samsung Internet
            - ✅ Поддержка GM_setValue/getValue, GM_addStyle, GM_xmlhttpRequest
            
            ### Установка:
            1. Скачай `app-debug.apk`
            2. Разреши установку из неизвестных источников
            3. Установи APK
            4. Открой Samsung Internet → Расширения → включи Tampermonkey
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
